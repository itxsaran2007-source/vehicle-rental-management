<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - DriveX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .vehicle-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .vehicle-img-container {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .vehicle-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .vehicle-card:hover .vehicle-img {
            transform: scale(1.1);
        }

        .vehicle-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .features {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .features span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-color);
        }
    </style>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav>
        <div class="logo">DriveX.</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="catalog.html" style="color: var(--primary-color);">Catalog</a></li>
            <li><a href="booking.html">Bookings</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="nav-actions">
            <a href="index.html" class="btn-outline" onclick="localStorage.clear()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">Premium Fleet</h1>

        <div class="filters">
            <button class="filter-btn active" onclick="filterSelection('all')">All</button>
            <button class="filter-btn" onclick="filterSelection('cars')">Cars</button>
            <button class="filter-btn" onclick="filterSelection('bikes')">Bikes</button>
            <button class="filter-btn" onclick="filterSelection('buses')">Buses</button>
        </div>

        <div class="catalog-grid perspective-container" id="vehicleGrid">
            <!-- Vehicles will be loaded dynamically -->
        </div>
    </div>


    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000' : 'https://vehicle-rental-management-cotn.onrender.com';

        async function fetchCatalog(category = 'all') {
            const grid = document.getElementById('vehicleGrid');
            grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Loading fleet...</p>';
            
            try {
                // Correctly map category names (remove plural 's', handle 'buses' -> 'bus')
                let apiCategory = category;
                if (category === 'cars') apiCategory = 'car';
                else if (category === 'bikes') apiCategory = 'bike';
                else if (category === 'buses') apiCategory = 'bus';
                
                const url = apiCategory === 'all' ? `${API_BASE}/api/vehicles` : `${API_BASE}/api/vehicles?category=${apiCategory}`;
                const res = await fetch(url);
                const result = await res.json();
                const vehicles = result.data || result;

                grid.innerHTML = '';
                
                if (Array.isArray(vehicles) && vehicles.length > 0) {
                    vehicles.forEach(v => {
                        const card = document.createElement('div');
                        card.className = 'glass-panel tilt-card vehicle-card';
                        card.setAttribute('data-category', v.category + 's');
                        
                        const icon = v.category === 'bike' ? 'motorcycle' : (v.category === 'bus' ? 'bus' : 'car');
                        
                        card.innerHTML = `
                            <div class="vehicle-img-container">
                                <img src="${v.image_url || 'https://via.placeholder.com/400x250'}" alt="${v.name}" class="vehicle-img" onerror="this.src='https://via.placeholder.com/400x250'">
                            </div>
                            <div class="vehicle-info">
                                <h2>${v.name}</h2>
                                <span class="vehicle-price">$${v.price_per_day}<span>/day</span></span>
                            </div>
                            <div class="features">
                                <span><i class="fas fa-users"></i> ${v.description || (v.category === 'bus' ? '40 Seats' : (v.category === 'car' ? '4 Seats' : '2 Seats'))}</span>
                                <span><i class="fas fa-gas-pump"></i> ${v.fuel_type || 'Petrol'}</span>
                                <span style="text-transform: capitalize;"><i class="fas fa-${icon}"></i> ${v.category}</span>
                            </div>
                            <a href="booking.html?vehicle_id=${v.id}" class="btn-primary" style="width: 100%; margin-top: 10px;">Book Now</a>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No vehicles found in this category.</p>';
                }
            } catch (err) {
                console.error('Catalog fetch error:', err);
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #ef4444;">Error loading catalog. Is the server running?</p>';
            }
        }

        function filterSelection(category) {
            const buttons = document.getElementsByClassName('filter-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
                // Check if button text matches category (case insensitive, handle plural)
                if (buttons[i].innerText.toLowerCase() === category.toLowerCase() || 
                    (category === 'all' && buttons[i].innerText === 'All')) {
                    buttons[i].classList.add('active');
                }
            }
            fetchCatalog(category);
        }

        // Initial load
        fetchCatalog();
    </script>
</body>

</html>
