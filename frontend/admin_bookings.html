<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings - DriveX Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: calc(100% - 250px);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-links {
            list-style: none;
            padding: 0;
        }
        .sidebar-links li {
            margin-bottom: 15px;
        }
        .sidebar-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            transition: 0.3s;
            color: #94a3b8;
            text-decoration: none;
        }
        .sidebar-links a:hover, .sidebar-links a.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
        }
        .sidebar-links a.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
        }

        .table-glass {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table-glass th, .table-glass td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .table-glass th {
            color: #94a3b8;
            font-weight: 500;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-cancelled { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-car-side"></i> DriveX Admin</div>
            <ul class="sidebar-links">
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="admin_fleet.html"><i class="fas fa-car"></i> Fleet Management</a></li>
                <li><a href="admin_users.html"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="admin_bookings.html" class="active"><i class="fas fa-calendar-check"></i> Bookings</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>All Bookings</h1>
            </div>

            <div class="glass-panel">
                <table class="table-glass" id="bookingTable">
                    <thead>
                        <tr>
                            <th>Booking ID</th>
                            <th>User</th>
                            <th>Vehicle</th>
                            <th>Pickup Date</th>
                            <th>Return Date</th>
                            <th>Total Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        async function fetchBookings() {
            try {
                const res = await fetch(`${API_BASE}/bookings/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                const bookings = result.data || result;
                const tbody = document.querySelector('#bookingTable tbody');
                tbody.innerHTML = '';

                bookings.forEach(b => {
                    const tr = document.createElement('tr');
                    const pickup = new Date(b.pickup_datetime).toLocaleDateString();
                    const ret = new Date(b.return_datetime).toLocaleDateString();
                    
                    tr.innerHTML = `
                        <td>#BK-${b.id}</td>
                        <td>${b.user_name || 'User #' + b.user_id}</td>
                        <td>${b.vehicle_name || 'Vehicle #' + b.vehicle_id}</td>
                        <td>${pickup}</td>
                        <td>${ret}</td>
                        <td>$${b.total_price}</td>
                        <td><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        fetchBookings();
    </script>
</body>
</html>
