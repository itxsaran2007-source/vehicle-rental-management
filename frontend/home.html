<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - DriveX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .stat-card {
            padding: 30px;
            text-align: center;
        }
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav>
        <div class="logo">DriveX.</div>
        <ul class="nav-links">
            <li><a href="home.html" style="color: var(--primary-color);">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="booking.html">Bookings</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="nav-actions">
            <a href="index.html" class="btn-outline" onclick="localStorage.clear()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 id="welcomeMessage" style="font-size: 2.5rem; margin-bottom: 10px;">Welcome back!</h1>
        <p style="color: var(--text-muted);">Here is an overview of your rental activity.</p>
<script>
    (function() {
        const firstName = localStorage.getItem('drivex_firstName') || 'User';
        document.getElementById('welcomeMessage').textContent = `Welcome back, ${firstName}!`;
    })();
</script>

        <div class="grid-container perspective-container">
            <div class="glass-panel tilt-card stat-card">
                <div class="stat-icon"><i class="fas fa-car"></i></div>
                <h3 style="font-size: 2rem;">2</h3>
                <p style="color: var(--text-muted);">Active Bookings</p>
            </div>
            
            <div class="glass-panel tilt-card stat-card">
                <div class="stat-icon" style="color: var(--secondary-color);"><i class="fas fa-history"></i></div>
                <h3 style="font-size: 2rem;">12</h3>
                <p style="color: var(--text-muted);">Past Rentals</p>
            </div>

            <div class="glass-panel tilt-card stat-card">
                <div class="stat-icon" style="color: #ec4899;"><i class="fas fa-star"></i></div>
                <h3 style="font-size: 2rem;">450</h3>
                <p style="color: var(--text-muted);">Reward Points</p>
            </div>
        </div>

        <div style="margin-top: 50px;" class="perspective-container">
            <div class="glass-panel tilt-card" style="padding: 40px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>Ready for your next adventure?</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Explore our new arrivals and premium fleet.</p>
                </div>
                <a href="catalog.html" class="btn-primary">Browse Catalog</a>
            </div>
        </div>
    </div>
</body>
</html>
