    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000' : 'https://vehicle-rental-management-cotn.onrender.com';

        // Initialize based on URL or defaults
        // Initialize based on URL or defaults
        window.onload = async function () {
            await Promise.all([fetchVehicles(), fetchLocations()]);
            
            const params = new URLSearchParams(window.location.search);
            const vehicleId = params.get('vehicle_id');
            const vehicleName = params.get('vehicle');
            const select = document.getElementById('vehicleSelect');

            if (vehicleId) {
                select.value = vehicleId;
            } else if (vehicleName) {
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].text === vehicleName) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }

            updateSummary();
        };

        async function fetchVehicles() {
            const select = document.getElementById('vehicleSelect');
            try {
                const res = await fetch(`${API_BASE}/api/vehicles`);
                const result = await res.json();
                const vehicles = result.data || result;
                
                if (Array.isArray(vehicles)) {
                    select.innerHTML = '<option value="">Select a vehicle</option>';
                    vehicles.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.id;
                        opt.text = v.name;
                        opt.dataset.img = v.image_url || 'https://via.placeholder.com/800x400';
                        opt.dataset.price = v.price_per_day;
                        opt.style.background = 'var(--bg-color)';
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('Error fetching vehicles:', err);
            }
        }

        async function fetchLocations() {
            const select = document.getElementById('locationSelect');
            if (!select) return;

            try {
                // Since there's no location API yet, I'll use the IDs I just seeded
                // Or I can just hardcode them in HTML as long as IDs match.
                // But let's assume if I added them to the DB, I should probably have an API.
                // For now, I'll just ensure the IDs in the HTML match the seeded IDs.
                select.innerHTML = `
                    <option value="1" style="background: var(--bg-color);">Downtown Hub</option>
                    <option value="2" style="background: var(--bg-color);">International Airport</option>
                    <option value="3" style="background: var(--bg-color);">Westside Branch</option>
                `;
            } catch (err) {
                console.error('Error setting locations:', err);
            }
        }

        function updateSummary() {
            var select = document.getElementById('vehicleSelect');
            if (!select.value) return;
            
            var option = select.options[select.selectedIndex];
            if (!option.dataset.img) return;

            document.getElementById('summaryImg').src = option.dataset.img;
            document.getElementById('summaryName').innerText = option.text;
            document.getElementById('summaryPrice').innerText = '$' + option.dataset.price + '/day';
        }

        function selectPayment(inputElement) {
            document.querySelectorAll('.payment-option').forEach(el => {
                el.style.borderColor = 'var(--glass-border)';
                el.style.background = 'rgba(255,255,255,0.05)';
            });
            if (inputElement.checked) {
                inputElement.parentElement.style.borderColor = 'var(--primary-color)';
                inputElement.parentElement.style.background = 'rgba(59, 130, 246, 0.2)';
            }
        }

        async function submitBooking(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) {
                alert("Please login to book a vehicle.");
                window.location.href = 'login.html';
                return;
            }

            const vehicleSelect = document.getElementById('vehicleSelect');
            const locationSelect = document.getElementById('locationSelect');
            const dateInputs = document.querySelectorAll('input[type="datetime-local"]');
            const paymentInput = document.querySelector('input[name="payment"]:checked');

            if (!vehicleSelect.value || !locationSelect.value || !dateInputs[0].value || !dateInputs[1].value || !paymentInput) {
                alert("Please fill in all fields and select a payment method.");
                return;
            }

            const pickupDate = new Date(dateInputs[0].value);
            const returnDate = new Date(dateInputs[1].value);

            if (returnDate <= pickupDate) {
                alert("Return date must be after pickup date.");
                return;
            }

            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                const bookingData = {
                    vehicle_id: vehicleSelect.value,
                    location_id: locationSelect.value,
                    pickup_datetime: dateInputs[0].value,
                    return_datetime: dateInputs[1].value,
                    payment_method: paymentInput.value.toUpperCase()
                };

                const response = await fetch(`${API_BASE}/api/bookings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(bookingData)
                });

                const result = await response.json();
                if (response.ok) {
                    const booking = result.data || result;
                    window.location.href = `slip.html?id=${booking.id}`;
                } else {
                    alert("Booking failed: " + (result.message || "Unknown error"));
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Confirm Booking";
                }
            } catch (err) {
                console.error('Booking error:', err);
                alert("An error occurred. Please try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Confirm Booking";
            }
        }

    </script>
