<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Slip - DriveX</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .slip-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transform: translateY(100px);
            opacity: 0;
            margin: 50px auto;
        }

        .slip-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse 2s infinite;
        }

        .slip-header {
            text-align: center;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .slip-header h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .slip-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .slip-detail span {
            color: #64748b;
        }

        .slip-detail strong {
            color: #0f172a;
        }

        .total-section {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-section h3 {
            margin: 0;
            color: #0f172a;
        }

        .total-section .amount {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        .barcode {
            text-align: center;
            margin-top: 30px;
        }

        .barcode img {
            width: 80%;
            height: 50px;
            opacity: 0.8;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); opacity: 0.1; }
            100% { transform: scale(1); opacity: 0.2; }
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #10b981;
            color: white;
            font-size: 40px;
            animation: popIn 0.5s 0.8s backwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Print Styles */
        @media print {
            body { background: white; }
            .bg-orb, nav, .download-btn { display: none !important; }
            .slip-container { box-shadow: none; margin: 0; padding: 20px; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav>
        <div class="logo">DriveX.</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="my_bookings.html">My Bookings</a></li>
        </ul>
    </nav>

    <div class="perspective-container">
        <div class="slip-container tilt-card" id="bookingSlip">
            <div class="success-checkmark">
                <i class="fas fa-check"></i>
            </div>
            <div class="slip-header">
                <h2>Booking Confirmed!</h2>
                <p>Thank you for choosing DriveX</p>
            </div>
            
            <div class="slip-body">
                <div class="slip-detail">
                    <span>Booking ID:</span>
                    <strong id="slipId">#DX-9847201</strong>
                </div>
                <div class="slip-detail">
                    <span>Vehicle:</span>
                    <strong id="slipVehicle">BMW M4 Competition</strong>
                </div>
                <div class="slip-detail">
                    <span>Pickup Date:</span>
                    <strong>Oct 24, 2026 10:00 AM</strong>
                </div>
                <div class="slip-detail">
                    <span>Return Date:</span>
                    <strong>Oct 26, 2026 10:00 AM</strong>
                </div>
                <div class="slip-detail">
                    <span>Payment Method:</span>
                    <strong id="slipPayment">UPI</strong>
                </div>
                
                <div class="total-section">
                    <h3>Total Paid</h3>
                    <div class="amount" id="slipTotal">$450.00</div>
                </div>

                <div class="barcode">
                    <!-- Simulate Barcode -->
                    <svg width="200" height="50" style="display:inline-block;">
                        <rect x="0" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="6" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="12" y="0" width="6" height="50" fill="#1e293b"/>
                        <rect x="22" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="28" y="0" width="8" height="50" fill="#1e293b"/>
                        <rect x="40" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="48" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="54" y="0" width="6" height="50" fill="#1e293b"/>
                        <rect x="64" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="72" y="0" width="8" height="50" fill="#1e293b"/>
                        <rect x="84" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="90" y="0" width="6" height="50" fill="#1e293b"/>
                        <rect x="100" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="108" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="114" y="0" width="8" height="50" fill="#1e293b"/>
                        <rect x="126" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="134" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="140" y="0" width="6" height="50" fill="#1e293b"/>
                        <rect x="150" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="156" y="0" width="8" height="50" fill="#1e293b"/>
                        <rect x="168" y="0" width="4" height="50" fill="#1e293b"/>
                        <rect x="176" y="0" width="2" height="50" fill="#1e293b"/>
                        <rect x="182" y="0" width="6" height="50" fill="#1e293b"/>
                        <rect x="192" y="0" width="4" height="50" fill="#1e293b"/>
                    </svg>
                    <p style="margin-top: 5px; font-family: monospace; letter-spacing: 5px; color: #64748b;">984720138491</p>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.print()" class="btn-primary download-btn" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 30px;">
                <i class="fas fa-download"></i> Download Slip
            </button>
            <a href="home.html" class="btn-outline download-btn" style="padding: 13px 40px; font-size: 1.2rem; border-radius: 30px; margin-left: 15px;">Back to Home</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if(params.has('vehicle')) {
                document.getElementById('slipVehicle').innerText = params.get('vehicle');
            }
            if(params.has('price')) {
                document.getElementById('slipTotal').innerText = '$' + params.get('price') + '.00';
            }
            if(params.has('payment')) {
                document.getElementById('slipPayment').innerText = params.get('payment');
            }
            
            // Randomize Booking ID for realism
            document.getElementById('slipId').innerText = '#DX-' + Math.floor(1000000 + Math.random() * 9000000);
        }
    </script>
</body>

</html>
