<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Management - DriveX Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: calc(100% - 250px);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-links {
            list-style: none;
            padding: 0;
        }
        .sidebar-links li {
            margin-bottom: 15px;
        }
        .sidebar-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            transition: 0.3s;
            color: #94a3b8;
            text-decoration: none;
        }
        .sidebar-links a:hover, .sidebar-links a.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
        }
        .sidebar-links a.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
        }

        .table-glass {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table-glass th, .table-glass td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .table-glass th {
            color: #94a3b8;
            font-weight: 500;
        }
        
        .action-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 10px;
            color: white;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-car-side"></i> DriveX Admin</div>
            <ul class="sidebar-links">
                <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="admin_fleet.html" class="active"><i class="fas fa-car"></i> Fleet Management</a></li>
                <li><a href="admin_users.html"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="admin_bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Fleet Management</h1>
                <button class="btn-primary" style="width: auto;" onclick="openModal()"><i class="fas fa-plus"></i> Add Vehicle</button>
            </div>

            <div class="glass-panel">
                <table class="table-glass" id="vehicleTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price/Day</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Vehicle Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0; margin-bottom: 25px;">Add New Vehicle</h2>
            <form id="addVehicleForm">
                <div class="form-group">
                    <label>Vehicle Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Tesla Model S" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" class="form-control" required>
                            <option value="car">Car</option>
                            <option value="bike">Bike</option>
                            <option value="bus">Bus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price Per Day</label>
                        <input type="number" name="price_per_day" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Transmission</label>
                    <select name="transmission" class="form-control">
                        <option value="Automatic">Automatic</option>
                        <option value="Manual">Manual</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fuel Type</label>
                    <input type="text" name="fuel_type" class="form-control" placeholder="Electric, Petrol, etc.">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" placeholder="Brief description of the vehicle..." rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" class="btn-primary" style="background: transparent; border: 1px solid var(--glass-border);" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Add Vehicle</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000/api' 
            : '/api';
        
        const token = localStorage.getItem('admin_token') || localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        async function fetchVehicles() {
            try {
                const res = await fetch(`${API_BASE}/vehicles`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                const vehicles = result.data || result;
                const tbody = document.querySelector('#vehicleTable tbody');
                tbody.innerHTML = '';

                if (Array.isArray(vehicles)) {
                    vehicles.forEach(v => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#V-${v.id}</td>
                            <td><img src="${v.image_url || 'https://via.placeholder.com/50'}" style="width: 50px; height: 35px; object-fit: cover; border-radius: 5px;" onerror="this.src='https://via.placeholder.com/50'"></td>
                            <td>${v.name}</td>
                            <td style="text-transform: capitalize;">${v.category}</td>
                            <td>$${v.price_per_day}</td>
                            <td><span style="color: ${v.is_available ? '#10b981' : '#ef4444'}">${v.is_available ? 'Available' : 'Unavailable'}</span></td>
                            <td>
                                <button class="action-btn delete" onclick="deleteVehicle(${v.id})" title="Delete Vehicle"><i class="fas fa-trash"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        async function deleteVehicle(id) {
            if (!confirm('Are you sure you want to remove this vehicle?')) return;
            try {
                const res = await fetch(`${API_BASE}/vehicles/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchVehicles();
                } else {
                    const error = await res.json();
                    alert('Error deleting vehicle: ' + (error.message || 'Unknown error'));
                }
            } catch (err) {
                console.error('Delete error:', err);
                alert('Connection error while deleting vehicle');
            }
        }

        document.getElementById('addVehicleForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            
            submitBtn.innerText = 'Adding...';
            submitBtn.disabled = true;

            const formData = new FormData(e.target);
            const body = Object.fromEntries(formData);
            
            // Convert price to number
            if (body.price_per_day) body.price_per_day = parseFloat(body.price_per_day);
            
            try {
                const res = await fetch(`${API_BASE}/vehicles`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    alert('Vehicle added successfully!');
                    e.target.reset();
                    closeModal();
                    fetchVehicles();
                } else {
                    alert('Error: ' + (result.message || 'Failed to add vehicle'));
                }
            } catch (err) {
                console.error('Add vehicle error:', err);
                alert('Connection error while adding vehicle. Is the server running?');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        };

        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }

        window.onclick = (e) => {
            if (e.target.id === 'addModal') closeModal();
        };

        fetchVehicles();
    </script>
</body>
</html>
