<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DriveX</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center;">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="perspective-container" style="width: 100%; max-width: 500px;">
        <div class="glass-panel tilt-card" style="padding: 40px; text-align: center;">
            <h2 style="font-size: 2rem; margin-bottom: 10px; background: linear-gradient(to right, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Create Account</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Join DriveX to start renting premium vehicles</p>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label>First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group" style="text-align: left; flex: 1;">
                        <label>Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+1 234 567 8900" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create a strong password" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; background: linear-gradient(135deg, #ec4899, #8b5cf6);">Sign Up</button>
            </form>
            
            <p style="margin-top: 20px; color: var(--text-muted);">Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: bold;">Login</a></p>
        </div>
    </div>
<script>
    async function handleRegister(e) {
        e.preventDefault();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();
        const email     = document.getElementById('email').value.trim();
        const phone     = document.getElementById('phone').value.trim();
        const password  = document.querySelector('input[type="password"]').value;

        const fullName = `${firstName} ${lastName}`;

        try {
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                ? 'http://localhost:5000' 
                : '';
            
            const response = await fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    full_name: fullName, 
                    email: email, 
                    phone: phone,
                    password: password 
                })
            });

            const result = await response.json();

            if (response.ok) {
                // Store token and user info
                const { token, user } = result.data || result;
                localStorage.setItem('token', token);
                localStorage.setItem('drivex_user', JSON.stringify(user));
                localStorage.setItem('drivex_email', user.email);
                localStorage.setItem('drivex_phone', user.phone || '');
                const nameParts = (user.full_name || '').split(' ');
                localStorage.setItem('drivex_firstName', nameParts[0] || '');
                localStorage.setItem('drivex_lastName', nameParts.slice(1).join(' ') || '');
                // Redirect to profile page
                window.location.href = 'profile.html';
            } else {
                alert(result.message || 'Registration failed');
            }
        } catch (error) {
            console.error('Registration error:', error);
            alert('An error occurred during registration. Please check if the server is running.');
        }
    }
</script>
</body>
</html>
